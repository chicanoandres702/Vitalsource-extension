<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilotPro HUD</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --cyan: #00f2ff;
            --green: #00ff88;
            --red: #ff4d4d;
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #2a2a2a;
            border: 1px solid var(--border);
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        button {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            border-color: var(--cyan);
            background: #2a2a2a;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary { border-color: var(--cyan); color: var(--cyan); }
        .btn-success { border-color: var(--green); color: var(--green); }
        .btn-danger { border-color: var(--red); color: var(--red); }
        
        .full-width { grid-column: span 2; }

        .vessel-info {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .info-label { color: #888; }
        .info-value { color: var(--cyan); font-family: monospace; }

        .progress-container {
            margin-bottom: 16px;
        }

        .progress-bar-bg {
            background: #2a2a2a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--cyan), var(--green));
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .toc-container {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-y: auto;
            padding: 8px;
        }

        .toc-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        /* Hierarchical TOC Styles */
        .toc-list { list-style: none; padding: 0; margin: 0; }
        .toc-item { margin-bottom: 4px; }
        .toc-link {
            display: block;
            padding: 6px 8px;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toc-link:hover { background: #2a2a2a; color: var(--cyan); }
        
        /* Nesting based on levels */
        .level-1 { padding-left: 12px; font-size: 0.8rem; opacity: 0.9; }
        .level-2 { padding-left: 24px; font-size: 0.75rem; opacity: 0.8; }
        .level-3 { padding-left: 36px; font-size: 0.7rem; opacity: 0.7; }

        .footer {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #666;
            text-align: center;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo">PILOTPRO</div>
        <div class="status-badge" id="status-display">STANDBY</div>
    </div>

    <div class="control-grid">
        <button id="btn-run" class="btn-primary full-width">START AUTO-RIP</button>
        <button id="btn-snap">SNAP PAGE</button>
        <button id="btn-pick">PICK TARGET</button>
        <button id="btn-autopick" class="full-width">AUTOPICK: ON</button>
        
        <!-- The Export and Clear actions -->
        <button id="btn-export" class="btn-success">EXPORT BOOK</button>
        <button id="btn-clear" class="btn-danger">CLEAR DATA</button>
        
        <!-- Backward compatibility button ID used in script -->
        <button id="btn-reconstruct" style="display: none;"></button>
    </div>

    <div class="vessel-info">
        <div class="info-row">
            <span class="info-label">Active Sensors</span>
            <span class="info-value" id="sensor-count">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Current CFI</span>
            <span class="info-value" id="cfi-display">none</span>
        </div>
    </div>

    <div class="progress-container">
        <div class="info-row">
            <span class="info-label">Capture Progress</span>
            <span class="info-value" id="progress-text">0 / 0</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="toc-title">Table of Contents</div>
    <div class="toc-container">
        <ul class="toc-list" id="toc-list">
            <!-- Dynamically populated hierarchical list -->
        </ul>
    </div>

    <div class="footer">
        PILOTPRO ENGINE V2.5 // AUTONOMOUS MODE
    </div>

    <!-- Scripts are assumed to be loaded via the extension manifest or relative paths -->
    <script src="storage.js"></script>
    <script src="renderer.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
